  />

  <!-- Upward trend line inside the bubble — progress -->
  <polyline
    points="155,300 210,265 260,280 345,195"
    fill="none"
    stroke="#c9953c"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Arrow tip -->
  <polyline
    points="310,205 345,195 335,230"
    fill="none"
    stroke="#c9953c"
    stroke-width="16"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
