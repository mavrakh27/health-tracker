<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- iOS-style rounded background -->
  <rect width="512" height="512" rx="112" fill="#111111"/>

  <!-- Subtle grid dots to suggest tracking/measurement -->
  <g fill="#1e1e1e">
    <circle cx="156" cy="156" r="3"/>
    <circle cx="256" cy="156" r="3"/>
    <circle cx="356" cy="156" r="3"/>
    <circle cx="156" cy="256" r="3"/>
    <circle cx="256" cy="256" r="3"/>
    <circle cx="356" cy="256" r="3"/>
    <circle cx="156" cy="356" r="3"/>
    <circle cx="256" cy="356" r="3"/>
    <circle cx="356" cy="356" r="3"/>
  </g>

  <!-- Upward trend line — the core mark -->
  <polyline
    points="120,360 200,310 270,330 390,150"
    fill="none"
    stroke="#3ecf6e"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Arrow tip on the trend line -->
  <polyline
    points="340,165 390,150 375,200"
    fill="none"
    stroke="#3ecf6e"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
