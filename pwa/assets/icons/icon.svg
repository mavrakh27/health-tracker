<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Warm dark rounded background -->
  <rect width="512" height="512" rx="112" fill="#1a1614"/>

  <!-- Speech bubble shape — coaching/guidance -->
  <path d="M256 100c-100 0-170 60-170 140 0 45 25 85 65 112l-15 60 65-35c17 5 35 7 55 7 100 0 170-58 170-144S356 100 256 100z"
    fill="#2a2520"
    stroke="#3d362e"
