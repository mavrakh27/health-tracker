<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Health">
  <title>Health Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="styles/theme.css">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <h1>Health Tracker</h1>
      <div class="header-nav">
        <button class="header-nav-btn" id="header-prev" aria-label="Previous day">&lsaquo;</button>
        <span class="header-date">Today</span>
        <button class="header-nav-btn" id="header-next" aria-label="Next day">&rsaquo;</button>
      </div>
    </header>

    <!-- Screen: Today (Day View) -->
    <main id="screen-today" class="screen active">
      <div class="stats-row" id="today-stats">
        <!-- Populated by app.js -->
      </div>

      <div class="quick-actions" id="quick-actions">
        <button class="quick-action quick-action-primary" id="quick-photo-btn">Snap food</button>
        <button class="quick-action quick-action-water" id="quick-water-btn">Water</button>
        <button class="quick-action" id="quick-weight-btn">Weight</button>
        <button class="quick-action quick-action-supplement" id="quick-supplement-btn">Supps</button>
      </div>

      <div id="today-coach"></div>

      <h2 class="section-header" style="margin-top: var(--space-lg)">Today's Log</h2>

      <div class="entry-list" id="today-entries">
        <div class="empty-state">
          <div class="empty-icon">&#x1F4CB;</div>
          <p>No entries yet today.<br>Tap + to start logging.</p>
        </div>
      </div>

      <div id="today-export" style="margin-top: var(--space-lg); display: none;">
        <button class="btn btn-secondary btn-block" id="today-export-btn" onclick="Sync.exportDay()">
          Export This Day
        </button>
      </div>

      <div id="today-analysis"></div>
    </main>

    <!-- Screen: Log (Add Entry) -->
    <main id="screen-log" class="screen">
      <h2 class="section-header">What are you logging?</h2>
      <div class="type-grid" id="log-type-grid">
        <!-- Populated by log.js -->
      </div>

      <div id="log-form" style="display:none; margin-top: var(--space-lg);">
        <div id="log-form-content">
          <!-- Dynamic form content -->
        </div>
      </div>
    </main>

    <!-- Screen: Calendar -->
    <main id="screen-calendar" class="screen">
      <div id="calendar-container"></div>
    </main>

    <!-- Screen: Goals -->
    <main id="screen-goals" class="screen">
      <div id="goals-container"></div>
    </main>

    <!-- Screen: Settings -->
    <main id="screen-settings" class="screen">
      <div class="s-card s-card--accent">
        <div class="s-card-row">
          <div class="s-card-body">
            <h3 class="s-title">Daily Goals</h3>
            <p class="s-subtitle" id="goals-summary">Loading...</p>
          </div>
          <button class="s-action-btn" onclick="App.showGoalSetup()">Edit</button>
        </div>
      </div>

      <div class="s-card">
        <div class="s-card-row">
          <div class="s-card-body">
            <h3 class="s-title">Cloud Sync</h3>
            <p class="s-subtitle" id="cloud-sync-status">Not configured</p>
          </div>
          <button class="s-action-btn s-action-btn--primary" onclick="CloudRelay.showSetup()">Setup</button>
        </div>
      </div>

      <div class="s-card">
        <div class="s-card-row">
          <div class="s-card-body">
            <h3 class="s-title">Backup</h3>
            <div class="s-toggle-row">
              <span class="s-toggle-label">Auto-backup daily</span>
              <label class="s-toggle">
                <input type="checkbox" id="autosync-toggle">
                <span class="s-toggle-track"></span>
              </label>
            </div>
          </div>
        </div>
        <div class="s-btn-row">
          <button class="btn btn-secondary" onclick="Sync.exportDay()">Export</button>
          <button class="btn btn-secondary" onclick="Sync.importAll()">Import</button>
          <button class="btn btn-secondary" onclick="Sync.restoreFromZip()">Restore</button>
        </div>
      </div>

      <div class="s-card">
        <div class="s-card-row">
          <div class="s-card-body">
            <p class="s-subtitle" id="storage-info">Loading...</p>
          </div>
        </div>
        <div class="s-btn-row">
          <button class="btn btn-secondary" id="clear-photos-btn" onclick="Settings.clearPhotos()">Clear Photos</button>
          <button class="btn btn-secondary" id="update-app-btn">Update App</button>
        </div>
        <div style="text-align:center; margin-top:var(--space-sm);">
          <span style="font-size:var(--text-xs); color:var(--text-muted);">Health Tracker <span id="app-version" class="s-version-badge"></span></span>
        </div>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-screen="today">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Today</span>
      </button>

      <button class="nav-item" data-screen="log">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="16"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        <span>Log</span>
      </button>

      <button class="nav-item" data-screen="calendar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span>Calendar</span>
      </button>

      <button class="nav-item" data-screen="goals">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="12" r="6"/>
          <circle cx="12" cy="12" r="2"/>
        </svg>
        <span>Goals</span>
      </button>

      <button class="nav-item" data-screen="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
        <span>Settings</span>
      </button>
    </nav>
  </div>

  <!-- Scripts (order matters) -->
  <script src="scripts/db.js"></script>
  <script src="scripts/ui.js"></script>
  <script src="scripts/log.js"></script>
  <script src="scripts/camera.js"></script>
  <script src="scripts/sync.js"></script>
  <script src="scripts/calendar.js"></script>
  <script src="scripts/fitness.js"></script>
  <script src="scripts/goals.js"></script>
  <script src="scripts/app.js"></script>

  <!-- Register Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js', { scope: './' })
        .then(reg => {
          console.log('SW registered:', reg.scope);
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'activated') {
                UI.toast('App updated — reloading...');
                setTimeout(() => window.location.reload(), 1000);
              }
            });
          });
        })
        .catch(err => console.error('SW registration failed:', err));
    }
  </script>
</body>
</html>
