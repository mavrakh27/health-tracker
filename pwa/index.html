<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Coach">
  <title>Coach</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="styles/theme.css">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <h1>Coach</h1>
      <div class="header-nav">
        <button class="header-nav-btn" id="header-prev" aria-label="Previous day">&lsaquo;</button>
        <span class="header-date">Today</span>
        <button class="header-nav-btn" id="header-next" aria-label="Next day">&rsaquo;</button>
      </div>
    </header>

    <!-- Screen: Today (Day View + Logging) -->
    <main id="screen-today" class="screen active">
      <div class="stats-row" id="today-stats"></div>

      <div class="quick-actions" id="quick-actions">
        <button class="quick-action quick-action-primary" id="quick-photo-btn">Snap food</button>
        <button class="quick-action quick-action-water" id="quick-water-btn">Water</button>
        <button class="quick-action" id="quick-weight-btn">Weight</button>
        <button class="quick-action quick-action-supplement" id="quick-supplement-btn">Supps</button>
      </div>

      <div id="today-score"></div>
      <div id="today-coach"></div>

      <!-- Inline entry creation (merged from Log) -->
      <div id="today-log-section">
        <h2 class="section-header" style="display:flex; justify-content:space-between; align-items:center;">
          <span>Log</span>
          <button class="btn btn-primary" id="toggle-log-types" style="font-size:var(--text-sm); padding:6px 16px; border-radius:999px;">+ Add</button>
        </h2>

        <div id="log-type-grid-inline" class="type-grid" style="display:none;">
          <!-- Populated by log.js -->
        </div>
        <div id="log-form-inline" style="display:none;">
          <div id="log-form-content-inline"></div>
        </div>
      </div>

      <div class="entry-list" id="today-entries">
        <div class="empty-state">
          <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="32" height="32"><rect x="5" y="3" width="14" height="18" rx="2"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg></div>
          <p>No entries yet today.<br>Tap + to start logging.</p>
        </div>
      </div>

      <div id="today-export" style="margin-top: var(--space-lg); display: none;">
        <button class="btn btn-secondary btn-block" id="today-export-btn" onclick="Sync.exportDay()">
          Export This Day
        </button>
      </div>

      <div id="today-analysis"></div>
    </main>

    <!-- Screen: Plan (Meals + Workout + Stretching) -->
    <main id="screen-plan" class="screen">
      <div id="plan-container"></div>
    </main>

    <!-- Screen: Progress (Journey + Calendar + Streaks) -->
    <main id="screen-progress" class="screen">
      <div id="progress-container"></div>
    </main>

    <!-- Screen: Profile (Coach + Goals + Settings) -->
    <main id="screen-profile" class="screen">
      <!-- Coach Chat -->
      <div id="profile-coach"></div>

      <!-- Fitness Goals -->
      <div id="profile-goals"></div>

      <!-- Daily Goals Editor -->
      <div class="s-card s-card--accent">
        <div class="s-card-row">
          <div class="s-card-body">
            <h3 class="s-title">Daily Targets</h3>
            <p class="s-subtitle" id="goals-summary">Loading...</p>
          </div>
          <button class="s-action-btn" onclick="App.showGoalSetup()">Edit</button>
        </div>
      </div>

      <!-- Cloud Sync -->
      <div class="s-card">
        <div class="s-card-row">
          <div class="s-card-body">
            <h3 class="s-title">Cloud Sync</h3>
            <p class="s-subtitle" id="cloud-sync-status">Not configured</p>
          </div>
          <button class="s-action-btn s-action-btn--primary" onclick="CloudRelay.showSetup()">Setup</button>
        </div>
      </div>

      <!-- Backup -->
      <div class="s-card">
        <div class="s-card-row">
          <div class="s-card-body">
            <h3 class="s-title">Backup</h3>
            <div class="s-toggle-row">
              <span class="s-toggle-label">Auto-backup daily</span>
              <label class="s-toggle">
                <input type="checkbox" id="autosync-toggle">
                <span class="s-toggle-track"></span>
              </label>
            </div>
          </div>
        </div>
        <div class="s-btn-row">
          <button class="btn btn-secondary" onclick="Sync.exportDay()">Export</button>
          <button class="btn btn-secondary" onclick="Sync.importAll()">Import</button>
          <button class="btn btn-secondary" onclick="Sync.restoreFromZip()">Restore</button>
        </div>
      </div>

      <!-- Storage -->
      <div class="s-card">
        <div class="s-card-row">
          <div class="s-card-body">
            <p class="s-subtitle" id="storage-info">Loading...</p>
          </div>
        </div>
        <div class="s-btn-row">
          <button class="btn btn-secondary" id="clear-photos-btn" onclick="Settings.clearPhotos()">Clear Photos</button>
          <button class="btn btn-secondary" id="update-app-btn">Update App</button>
        </div>
        <div style="text-align:center; margin-top:var(--space-sm);">
          <span style="font-size:var(--text-xs); color:var(--text-muted);">Coach <span id="app-version" class="s-version-badge"></span></span>
        </div>
      </div>
    </main>

    <!-- Bottom Navigation (4 tabs) -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-screen="today">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
        </svg>
        <span>Today</span>
      </button>

      <button class="nav-item" data-screen="plan">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="3" width="16" height="18" rx="2"/>
          <line x1="8" y1="8" x2="16" y2="8"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
          <line x1="8" y1="16" x2="12" y2="16"/>
        </svg>
        <span>Plan</span>
      </button>

      <button class="nav-item" data-screen="progress">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 18 8 12 12 14 16 8 20 4"/>
          <line x1="20" y1="4" x2="20" y2="8"/>
          <line x1="20" y1="4" x2="16" y2="4"/>
        </svg>
        <span>Progress</span>
      </button>

      <button class="nav-item" data-screen="profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 21v-1a6 6 0 0112 0v1"/>
        </svg>
        <span>Profile</span>
      </button>
    </nav>
  </div>

  <!-- Scripts (order matters) -->
  <script src="scripts/db.js"></script>
  <script src="scripts/ui.js"></script>
  <script src="scripts/log.js"></script>
  <script src="scripts/camera.js"></script>
  <script src="scripts/sync.js"></script>
  <script src="scripts/fitness.js"></script>
  <script src="scripts/goals.js"></script>
  <script src="scripts/plan.js"></script>
  <script src="scripts/progress.js"></script>
  <script src="scripts/coach.js"></script>
  <script src="scripts/profile.js"></script>
  <script src="scripts/score.js"></script>
  <script src="scripts/app.js"></script>

  <!-- Register Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js', { scope: './' })
        .then(reg => {
          console.log('SW registered:', reg.scope);
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'activated') {
                UI.toast('App updated — reloading...');
                setTimeout(() => window.location.reload(), 1000);
              }
            });
          });
        })
        .catch(err => console.error('SW registration failed:', err));
    }
  </script>
</body>
</html>
