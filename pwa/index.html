<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Coach">
  <title>Coach</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="styles/theme.css">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <h1>Coach</h1>
      <div class="header-nav">
        <button class="header-nav-btn" id="header-prev" aria-label="Previous day">&lsaquo;</button>
        <span class="header-date">Today</span>
        <button class="header-nav-btn" id="header-next" aria-label="Next day">&rsaquo;</button>
      </div>
    </header>

    <!-- Screen: Today (Day View + Logging) -->
    <main id="screen-today" class="screen active">
      <div class="stats-row" id="today-stats"></div>

      <div class="quick-actions" id="quick-actions">
        <button class="quick-action quick-action-primary" id="quick-photo-btn">
          <span class="qa-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="16" rx="2"/><circle cx="12" cy="13" r="4"/><path d="M8.5 5L9.5 3h5l1 2"/></svg></span>
          Snap food
        </button>
        <button class="quick-action quick-action-water" id="quick-water-btn">
          <span class="qa-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c0 0-6 7-6 12a6 6 0 0012 0c0-5-6-12-6-12z"/></svg></span>
          Water
        </button>
        <button class="quick-action quick-action-weight" id="quick-weight-btn">
          <span class="qa-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="10" width="18" height="10" rx="2"/><path d="M8 10V8a4 4 0 018 0v2"/></svg></span>
          Weight
        </button>
        <button class="quick-action quick-action-supplement" id="quick-supplement-btn">
          <span class="qa-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="16" rx="6"/><line x1="6" y1="12" x2="18" y2="12"/></svg></span>
          Dailies
        </button>
      </div>

      <div id="today-score"></div>
      <div id="today-workout"></div>
      <div id="today-meal-suggestion"></div>
      <div id="today-coach"></div>

      <!-- Inline entry creation (merged from Log) -->
      <div id="today-log-section" style="margin-top: var(--space-md);">
        <div id="log-type-grid-inline" class="type-grid" style="display:none;">
          <!-- Populated by log.js -->
        </div>
        <div id="log-form-inline" style="display:none;">
          <div id="log-form-content-inline"></div>
        </div>
      </div>

      <div class="entry-list" id="today-entries">
      </div>

      <div id="today-analysis"></div>
    </main>

    <!-- Screen: Progress (Insights + Trends + Goals) -->
    <main id="screen-progress" class="screen">
      <div id="progress-container"></div>
    </main>

    <!-- Screen: Settings (was Profile) -->
    <main id="screen-settings" class="screen">
      <!-- Daily Goals Editor -->
      <div class="s-card s-card--accent">
        <div class="s-card-row">
          <div class="s-card-body">
            <h3 class="s-title">Daily Targets</h3>
            <p class="s-subtitle" id="goals-summary">Loading...</p>
          </div>
          <button class="s-action-btn" onclick="App.showGoalSetup()">Edit</button>
        </div>
      </div>

      <!-- Dailies -->
      <div class="s-card">
        <div class="s-card-row">
          <div class="s-card-body">
            <h3 class="s-title">Dailies</h3>
            <p class="s-subtitle">Supplements, vitamins, and daily items</p>
          </div>
          <button class="s-action-btn" onclick="QuickLog.showDailiesManager()">Manage</button>
        </div>
      </div>

      <!-- Sync Now — primary sync action -->
      <button class="btn btn-primary btn-block btn-lg" id="profile-sync-now" onclick="App.syncNow()" style="margin-bottom: var(--space-md);">Sync Now</button>

      <!-- Cloud Sync -->
      <div class="s-card s-card--accent">
        <div class="s-card-row">
          <div class="s-icon">&#9729;</div>
          <div class="s-card-body">
            <h3 class="s-title">Cloud Sync</h3>
            <p class="s-subtitle" id="cloud-sync-status">Not configured</p>
          </div>
          <button class="s-action-btn" onclick="CloudRelay.showSetup()">Setup</button>
        </div>
        <div class="s-btn-row" style="margin-top: var(--space-sm);">
          <button class="btn btn-secondary" onclick="App.checkResults()">Check Results</button>
          <button class="btn btn-ghost" onclick="CloudRelay.resyncAll()" style="font-size: var(--text-xs);">Re-sync All</button>
        </div>
      </div>

      <!-- Setup Guide -->
      <div class="s-card">
        <div class="s-card-row">
          <div class="s-icon">&#128218;</div>
          <div class="s-card-body">
            <h3 class="s-title">Setup Guide</h3>
            <p class="s-subtitle">Set up AI processing on your computer</p>
          </div>
          <a class="s-action-btn" href="https://github.com/nEmily/health-tracker/blob/main/docs/getting-started.md" target="_blank" rel="noopener" style="text-decoration:none;">View</a>
        </div>
      </div>

      <!-- Storage -->
      <div class="s-card">
        <div class="s-card-row">
          <div class="s-card-body">
            <p class="s-subtitle" id="storage-info">Loading...</p>
          </div>
        </div>
        <div class="s-btn-row">
          <button class="btn btn-danger" id="clear-photos-btn" onclick="Settings.clearPhotos()">Clear Photos</button>
          <button class="btn btn-secondary" id="update-app-btn">Update App</button>
        </div>
        <div style="text-align:center; padding:var(--space-md); margin-top:var(--space-xs);">
          <span style="font-size:var(--text-xs); color:var(--text-muted);">Coach <span id="app-version" class="s-version-badge"></span></span>
        </div>
      </div>
    </main>

    <!-- Bottom Navigation (4 tabs) -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-screen="today">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
        </svg>
        <span>Today</span>
      </button>

      <button class="nav-item" data-screen="progress">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 18 8 12 12 14 16 8 20 4"/>
          <line x1="20" y1="4" x2="20" y2="8"/>
          <line x1="20" y1="4" x2="16" y2="4"/>
        </svg>
        <span>Progress</span>
      </button>

      <button class="nav-item" data-screen="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09a1.65 1.65 0 00-1.08-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09a1.65 1.65 0 001.51-1.08 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
        <span>Settings</span>
      </button>
    </nav>
  </div>

  <!-- Scripts (order matters) -->
  <script src="scripts/db.js"></script>
  <script src="scripts/ui.js"></script>
  <script src="scripts/log.js"></script>
  <script src="scripts/camera.js"></script>
  <script src="scripts/sync.js"></script>
  <script src="scripts/fitness.js"></script>
  <script src="scripts/goals.js"></script>
  <script src="scripts/plan.js"></script>
  <script src="scripts/progress.js"></script>
  <script src="scripts/coach.js"></script>
  <script src="scripts/profile.js"></script>
  <script src="scripts/score.js"></script>
  <script src="scripts/app.js"></script>

  <!-- Register Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js', { scope: './' })
        .then(reg => {
          console.log('SW registered:', reg.scope);
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'activated') {
                UI.toast('App updated — reloading...');
                setTimeout(() => window.location.reload(), 1000);
              }
            });
          });
        })
        .catch(err => console.error('SW registration failed:', err));
    }
  </script>
</body>
</html>
